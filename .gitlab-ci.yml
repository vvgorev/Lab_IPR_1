variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_BUILDKIT: 1

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip/

stages:
  - test
  - build

unit-tests:
  stage: test
  image: python:3.12
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest tests/ --junitxml=report.xml --cov=src/ --cov-report=xml:coverage.xml
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

build-app:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  needs: [unit-tests]
  script:
    # 1. Сборка образа с уникальным тегом
    - docker build -t app-build:$CI_COMMIT_SHORT_SHA .
    
    # 2. Проверка работоспособности
    - docker run --rm app-build:$CI_COMMIT_SHORT_SHA python -c "import src; print('✅ App imports successfully')"
    - docker run --rm app-build:$CI_COMMIT_SHORT_SHA pytest tests/ --tb=short -q
    
    # 3. Сохранение образа как артефакта
    - docker save -o app-image.tar app-build:$CI_COMMIT_SHORT_SHA
    - echo "Build completed at $(date)" > build-info.txt
    
  artifacts:
    paths:
      - app-image.tar
      - build-info.txt
    expire_in: 7 days
    when: on_success
    
  rules:
    - if: $CI_COMMIT_BRANCH == "main"